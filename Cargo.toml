[package]
name = "bevyski"
version = "0.1.0"
edition = "2021"
authors = ["BevySki Contributors"]
description = "Modern cross-platform rewrite of the classic MacSki game using Bevy"
license = "GPL-3.0"

[dependencies]
bevy = "0.15"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
